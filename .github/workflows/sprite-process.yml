name: Sprite integration review helper

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Normalize integration and orientation mapping
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          render_path = Path('src/render.js')
          render = render_path.read_text(encoding='utf-8')

          loader = '''  // SPRITE-01: presentation-only pawn art. Browser images load once and
          // remain optional; Node tests and failed assets keep the vector placeholder.
          const PAWN_SPRITE_PATHS = {
            front: 'Sprites/Placeholders/processed/pawn_front.png',
            side: 'Sprites/Placeholders/processed/pawn_side.png',
            back: 'Sprites/Placeholders/processed/pawn_back.png'
          };
          const pawnSpriteSlots = {
            front: { image: null, failed: false },
            side: { image: null, failed: false },
            back: { image: null, failed: false }
          };
          let pawnSpriteLoadStarted = false;
          let pawnSpriteLoadsPending = Object.keys(PAWN_SPRITE_PATHS).length;
          function settlePawnSpriteLoad() {
            pawnSpriteLoadsPending--;
            // The editor renders on demand. A resize event is already its supported
            // presentation invalidation path, so repaint once all sprite requests settle.
            if (pawnSpriteLoadsPending === 0 && typeof window !== 'undefined') {
              window.dispatchEvent(new Event('resize'));
            }
          }
          function ensurePawnSprites() {
            if (pawnSpriteLoadStarted || typeof Image === 'undefined') return;
            pawnSpriteLoadStarted = true;
            for (const key of Object.keys(PAWN_SPRITE_PATHS)) {
              const slot = pawnSpriteSlots[key];
              const image = new Image();
              image.decoding = 'async';
              image.onload = () => { slot.image = image; settlePawnSpriteLoad(); };
              image.onerror = () => { slot.failed = true; slot.image = null; settlePawnSpriteLoad(); };
              image.src = PAWN_SPRITE_PATHS[key];
            }
          }
          function pawnSpriteForFacing(facing) {
            ensurePawnSprites();
            const dx = Math.cos(facing), dy = Math.sin(facing);
            let key = 'side', mirror = false;
            if (Math.abs(dy) >= Math.abs(dx)) key = dy >= 0 ? 'front' : 'back';
            else mirror = dx < 0;
            return { image: pawnSpriteSlots[key].image, mirror };
          }
          ensurePawnSprites();'''

          render, count = re.subn(
              r"  // SPRITE-01: presentation-only pawn art\..*?ensurePawnSprites\(\);",
              loader,
              render,
              count=1,
              flags=re.S,
          )
          if count != 1:
              raise RuntimeError(f'Expected one sprite loader block, got {count}')

          old_direction = '''      const facing = td
                ? Math.atan2(wd.y, wd.x)                                        // plan: x right, y down
                : Math.atan2((wd.x + wd.y) * (projH(cam) / TILE_W), wd.x - wd.y); // iso diamond angle
              if (td) drawPawnFigureFlat(ctx, s, z, e.p, facing, e.p.id === opts.selectedId, opts.time || 0);
              else drawPawnFigure(ctx, s, z, e.p, facing, e.p.id === opts.selectedId, opts.time || 0);'''
          new_direction = '''      const spriteFacing = Math.atan2(wd.y, wd.x);                   // world: south/front, north/back
              const facing = td
                ? spriteFacing                                                // plan: x right, y down
                : Math.atan2((wd.x + wd.y) * (projH(cam) / TILE_W), wd.x - wd.y); // iso screen angle
              if (td) drawPawnFigureFlat(ctx, s, z, e.p, facing, e.p.id === opts.selectedId, opts.time || 0);
              else drawPawnFigure(ctx, s, z, e.p, facing, spriteFacing, e.p.id === opts.selectedId, opts.time || 0);'''
          if old_direction not in render:
              raise RuntimeError('drawAgents direction block not found')
          render = render.replace(old_direction, new_direction, 1)

          pawn_functions = '''  function drawPawnPlaceholder(ctx, s, z, facing, bob) {
            const fx = Math.cos(facing), fy = Math.sin(facing) * 0.6;
            const bodyH = 34 * z;
            ctx.beginPath(); ctx.ellipse(s.x, s.y - bodyH * 0.45 + bob, 9 * z, bodyH * 0.5, 0, 0, Math.PI * 2);
            ctx.fillStyle = '#dcdcde'; ctx.fill(); ctx.strokeStyle = '#8a8a92'; ctx.lineWidth = 1.4; ctx.stroke();
            const hy = s.y - bodyH + bob;
            ctx.beginPath(); ctx.arc(s.x, hy, 7 * z, 0, Math.PI * 2); ctx.fillStyle = '#ededf0'; ctx.fill(); ctx.stroke();
            ctx.beginPath(); ctx.arc(s.x + fx * 6 * z, hy + fy * 6 * z, 2 * z, 0, Math.PI * 2); ctx.fillStyle = '#2a2a2e'; ctx.fill();
          }

          function drawPawnFigure(ctx, s, z, pawn, facing, spriteFacing, selected, time) {
            const bob = pawn.moving ? Math.sin(time * 11) * 1.6 * z : 0;
            ctx.save();
            // Keep the renderer-owned shadow and selection ring below the sprite.
            ctx.globalAlpha = 0.34; ctx.fillStyle = '#000';
            ctx.beginPath(); ctx.ellipse(s.x, s.y, 11 * z, 5.5 * z, 0, 0, Math.PI * 2); ctx.fill();
            ctx.globalAlpha = 1;
            if (selected) {
              ctx.strokeStyle = '#f2f2f4'; ctx.lineWidth = 1.6 * z; ctx.setLineDash([6 * z, 4 * z]);
              ctx.beginPath(); ctx.ellipse(s.x, s.y, 15 * z, 7.5 * z, 0, 0, Math.PI * 2); ctx.stroke(); ctx.setLineDash([]);
            }
            const sprite = pawnSpriteForFacing(spriteFacing);
            if (sprite.image) {
              const drawH = 42 * z;
              const naturalW = sprite.image.naturalWidth || sprite.image.width || 1;
              const naturalH = sprite.image.naturalHeight || sprite.image.height || 1;
              const drawW = drawH * naturalW / naturalH;
              ctx.save();
              ctx.translate(s.x, s.y + bob);                 // feet stay anchored at tile centre
              if (sprite.mirror) ctx.scale(-1, 1);
              ctx.drawImage(sprite.image, -drawW / 2, -drawH, drawW, drawH);
              ctx.restore();
            } else {
              drawPawnPlaceholder(ctx, s, z, facing, bob);
            }
            ctx.restore();
          }'''
          render, count = re.subn(
              r"  function drawPawnPlaceholder\(ctx, s, z, facing, bob\) \{.*?(?=\n  // centre a camera)",
              pawn_functions + '\n',
              render,
              count=1,
              flags=re.S,
          )
          if count != 1:
              raise RuntimeError(f'Expected one pawn function block, got {count}')
          render_path.write_text(render, encoding='utf-8')

          smoke_path = Path('tests/smoke/smoke.mjs')
          smoke = smoke_path.read_text(encoding='utf-8')
          smoke_block = '''  // SPRITE-01: all renderer sprite assets must resolve from file:// and Pages.
          const spriteAssets = await page.evaluate(async () => {
            const paths = [
              'Sprites/Placeholders/processed/pawn_front.png',
              'Sprites/Placeholders/processed/pawn_side.png',
              'Sprites/Placeholders/processed/pawn_back.png',
            ];
            return Promise.all(paths.map(src => new Promise(resolve => {
              const image = new Image();
              image.onload = () => resolve({ src, ok: image.naturalWidth > 0 && image.naturalHeight > 0, width: image.naturalWidth, height: image.naturalHeight });
              image.onerror = () => resolve({ src, ok: false, width: 0, height: 0 });
              image.src = new URL(src, document.baseURI).href;
            })));
          });
          ck('sprites: processed pawn assets load', spriteAssets.every(asset => asset.ok), spriteAssets);

          '''
          smoke, count = re.subn(
              r"  // SPRITE-01: all renderer sprite assets.*?(?=  // ── 1\. boot:)",
              smoke_block,
              smoke,
              count=1,
              flags=re.S,
          )
          if count != 1:
              raise RuntimeError(f'Expected one sprite smoke block, got {count}')
          smoke_path.write_text(smoke, encoding='utf-8')
          PY
      - name: Install dependencies and Chromium
        run: |
          npm install
          npx playwright install --with-deps chromium
      - name: Run unit and browser smoke tests
        run: |
          npm test
          npm run smoke
      - name: Capture cardinal-facing renderer review
        run: |
          mkdir -p .sprite-output
          node --input-type=module <<'JS'
          import { chromium } from 'playwright';
          import { pathToFileURL } from 'node:url';
          import path from 'node:path';

          const browser = await chromium.launch();
          const page = await browser.newPage({ viewport: { width: 900, height: 460 } });
          await page.goto(pathToFileURL(path.resolve('index.html')).href);
          await page.waitForFunction(() => !!(window.UGS && window.UGS.render));
          await page.evaluate(async () => {
            const paths = ['pawn_front.png', 'pawn_side.png', 'pawn_back.png']
              .map(name => `Sprites/Placeholders/processed/${name}`);
            await Promise.all(paths.map(src => new Promise((resolve, reject) => {
              const image = new Image(); image.onload = resolve; image.onerror = reject; image.src = src;
            })));
            await new Promise(resolve => setTimeout(resolve, 100));

            document.body.innerHTML = '';
            document.body.style.margin = '0';
            document.body.style.background = '#171920';
            const canvas = document.createElement('canvas');
            canvas.id = 'sprite-review'; canvas.width = 900; canvas.height = 460;
            document.body.appendChild(canvas);
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#242832'; ctx.fillRect(0, 0, canvas.width, canvas.height);

            const R = window.UGS.render;
            const room = {
              id: 'review-room', size: { w: 6, h: 5 },
              transform: { x: 0, y: 0, rotation: 0, pivot: { x: 0, y: 0 } },
              objects: [], events: []
            };
            const level = { id: 'review-level', rooms: [room] };
            const defs = [
              ['East / side', 1, 0, { x: 1, y: 0 }],
              ['West / mirrored', 3, 0, { x: -1, y: 0 }],
              ['South / front', 1, 3, { x: 0, y: 1 }],
              ['North / back', 3, 3, { x: 0, y: -1 }],
            ];
            const pawns = defs.map(([label, x, y, facingLocal], i) => ({
              id: `pawn-${i}`, levelId: level.id, roomId: room.id,
              x, y, facingLocal, path: [], moving: false, label
            }));
            const cam = { x: 430, y: 75, zoom: 2, projection: 'isoTilted' };
            R.drawAgents(ctx, cam, level, pawns, { showPaths: false, selectedId: 'pawn-2', time: 0 });
            ctx.font = '15px sans-serif'; ctx.textAlign = 'center'; ctx.fillStyle = '#f1f3f7';
            for (const pawn of pawns) {
              const world = R.localToWorld(room, pawn.x + 0.5, pawn.y + 0.5);
              const screen = R.worldToScreen(cam, world.x, world.y);
              ctx.fillText(pawn.label, screen.x, screen.y + 28);
            }
          });
          await page.locator('#sprite-review').screenshot({ path: '.sprite-output/render_review.png' });
          await browser.close();
          JS
      - name: Upload visual review
        uses: actions/upload-artifact@v4
        with:
          name: sprite-01-render-review
          path: .sprite-output/render_review.png
          if-no-files-found: error
      - name: Commit polished integration
        run: |
          git config user.name 'Codex'
          git config user.email 'codex@users.noreply.github.com'
          git add src/render.js tests/smoke/smoke.mjs
          if git diff --cached --quiet; then
            echo 'No integration changes to commit.'
          else
            git commit -m 'Polish pawn sprite integration [skip sprite-review]'
            git push origin HEAD:${{ github.head_ref }}
          fi
