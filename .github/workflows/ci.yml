name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run unit test suites
        run: npm test

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install
      - name: Install Chromium for Playwright
        run: npx playwright install --with-deps chromium
      - name: Run browser smoke tests
        run: npm run smoke

  sprite-diagnostic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Capture patch traceback
        run: |
          mkdir -p .sprite-output
          python - <<'PY' > .sprite-output/patch.log 2>&1 || true
          from pathlib import Path
          import textwrap

          workflow = Path('.github/workflows/sprite-process.yml').read_text(encoding='utf-8')
          marker = "          python - <<'PY'\n"
          print('marker present:', marker in workflow)
          start = workflow.index(marker) + len(marker)
          end = workflow.index('\n          PY', start)
          script = textwrap.dedent(workflow[start:end])
          print('script chars:', len(script))
          print('script first line:', repr(script.splitlines()[0] if script.splitlines() else ''))
          exec(compile(script, 'sprite-review-patch', 'exec'))
          print('PATCH_OK')
          PY
          cat .sprite-output/patch.log
      - name: Upload patch diagnostic
        uses: actions/upload-artifact@v4
        with:
          name: sprite-01-patch-diagnostic
          path: .sprite-output/patch.log
          if-no-files-found: error
